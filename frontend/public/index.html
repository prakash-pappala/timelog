<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TimeBook</title>
  <style>
    body {
      margin: 0;
      padding: 2rem 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
    }
    button {
      font-family: inherit;
      border: 0.5px solid #d8d6cf;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
    }
    button:hover { background: #f1f0ea; }
    button:disabled { cursor: not-allowed; }
    input {
      font-family: inherit;
      border: 0.5px solid #d8d6cf;
      border-radius: 8px;
      padding: 8px 10px;
      height: 36px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
